<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Make Them Care: Pitch Your Build</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div class="top-bar">
      <div class="progress-bar">
        <div class="seg" id="seg-0"></div>
        <div class="seg" id="seg-1"></div>
        <div class="seg" id="seg-2"></div>
        <div class="seg" id="seg-3"></div>
        <div class="seg" id="seg-4"></div>
      </div>
      <div class="step-meta">
        <span id="step-counter">Step 1 of 5</span>
        <span id="time-badge">2 min</span>
      </div>
    </div>

    <div id="step-panel"></div>

    <div class="bottom-nav">
      <button id="prev-btn" class="nav-btn">← prev</button>
      <div class="dots" id="dots"></div>
      <button id="next-btn" class="nav-btn primary">next →</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
